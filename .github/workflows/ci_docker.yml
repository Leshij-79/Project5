name: DjangoLMS_API CI/CD Docker
on: [push, pull_request]

jobs:

  build:
    runs-on: ubuntu-latest
#    needs: test

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Create .env file on server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            cd ${{ secrets.DEPLOY_DIR }}
            # Создаем .env
            cat > .env << 'ENVEOF'
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            EMAIL_HOST_USER=${{ secrets.EMAIL_HOST_USER }}
            EMAIL_HOST_PASSWORD=${{ secrets.EMAIL_HOST_PASSWORD }}
            CELERY_BROKER_URL=${{ secrets.CELERY_BROKER_URL }}
            CELERY_RESULT_BACKEND=${{ secrets.CELERY_RESULT_BACKEND }}
            REDIS_HOST=${{ secrets.REDIS_HOST }}
            ENVEOF
          EOF

      - name: Log in to Docker Hub
        run: echo ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }} | docker login -u ${{ secrets.DOCKER_HUB_USERNAME }} --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/project5-web-1:${{ github.sha }} .

      - name: Push Docker image to Docker Hub
        run: docker push ${{ secrets.DOCKER_HUB_USERNAME }}/project5-web-1:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
            ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Deploy to Server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} << 'DEPLOY_EOF'
            echo ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }} | docker login -u ${{ secrets.DOCKER_HUB_USERNAME }} --password-stdin

            cd ${{ secrets.DEPLOY_DIR }}

            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" > .env
            echo "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}" >> .env
            echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
            echo "DB_USER=${{ secrets.DB_USER }}" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "DB_HOST=${{ secrets.DB_HOST_DB }}" >> .env
            echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env
            echo "EMAIL_HOST_USER=${{ secrets.EMAIL_HOST_USER }}" >> .env
            echo "EMAIL_HOST_PASSWORD=${{ secrets.EMAIL_HOST_PASSWORD }}" >> .env
            echo "CELERY_BROKER_URL=${{ secrets.CELERY_BROKER_URL }}" >> .env
            echo "CELERY_RESULT_BACKEND=${{ secrets.CELERY_RESULT_BACKEND }}" >> .env
            echo "REDIS_HOST=${{ secrets.REDIS_HOST }}" >> .env

            docker volume create static_volume || true

            docker stop project5-web-1 || true 
            docker rm project5-web-1 || true
          
            docker stop project5-nginx-1
            docker rm project5-nginx-1
          
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/project5-web-1:${{ github.sha }}

            docker run -d \
            --name project5-web-1 \
            --network project5_default \
            -p 8000:8000 \
            --env-file .env \
            --network-alias web \
            -v static_volume:/code/staticfiles \
            project5-web
          
            docker run -d \
            --name project5-nginx-1 \
            --network project5_default \
            -p 80:80 \
            -v $(pwd)/nginx/nginx.conf:/etc/nginx/nginx.conf:ro \
            -v static_volume:/usr/share/nginx/html/staticfiles \
            nginx:alpine

            # Создаем директорию для статики внутри контейнера
            docker exec project5-web-1 mkdir -p /code/staticfiles

            echo "=== STATIC_ROOT ==="
            docker exec project5-web-1 python manage.py shell -c "from django.conf import settings; print(settings.STATIC_ROOT)"

            # Собираем статику
            echo "=== Collecting static files ==="
            docker exec project5-web-1 python manage.py collectstatic --noinput

            docker image prune -a -f
          DEPLOY_EOF
          
